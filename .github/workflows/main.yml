name: Build ImmortalWrt

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Build
        run: |
          # هذه أوامر مبسطة للبدء
          make defconfig
          make image PROFILE="zte_e8820s" PACKAGES="luci luci-ssl" FILES="files/"
